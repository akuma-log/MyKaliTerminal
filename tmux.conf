# Set the prefix to Ctrl+a
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# Quality of Life
set -g history-limit 9999999
set -g mouse on
unbind -n MouseDrag1Pane

# Copy and paste with vi keys
setw -g mode-keys vi

# Check for xclip, fallback to default if not available
if-shell "command -v xclip" {
    # Copy with xclip when available
    unbind -T copy-mode-vi Enter
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
} {
    # Fallback to default copy behavior
    bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
}

# Sane scrolling (consolidated version)
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Ctrl + wheel for faster scrolling
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -X halfpage-up
bind -n C-WheelDownPane select-pane -t= \; copy-mode -e \; send-keys -X halfpage-down
bind -T copy-mode-vi C-WheelUpPane send-keys -X halfpage-up
bind -T copy-mode-vi C-WheelDownPane send-keys -X halfpage-down

# Bar color
set -g status-bg cyan
set -g status-fg black
set -g window-status-current-style bg=red,fg=white,bold
set -g window-status-style bg=cyan,fg=black

# Rename window auto
setw -g automatic-rename on
set -g renumber-windows on

# Split panes using | and -
bind \\ split-window -h  # Using backslash instead of ^ (Ctrl+\) or use C-\
bind - split-window -v
unbind '"'
unbind %

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift + Left/Right to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Toggle zoom for current pane (Ctrl+Space)
bind-key -n C-Space resize-pane -Z

# Start numbering at 1 for panes and windows
set-option -g pane-base-index 1
set-option -g window-base-index 1  # Also set windows to start at 1

# Status bar customization (optional)
set -g status-left-length 60
set -g status-right-length 90
set -g status-left "#[fg=black,bg=cyan] #S #[default]"
set -g status-right "#[fg=black,bg=cyan] %H:%M #[default]"

# Better window list format
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-logging'

# Optional useful plugins (consider adding):
# set -g @plugin 'tmux-plugins/tmux-resurrect'  # Save/restore sessions
# set -g @plugin 'tmux-plugins/tmux-continuum'  # Auto-save sessions

# Initialize TMUX plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
